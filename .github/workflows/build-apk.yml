name: Forge Forced Build
on: [push]

jobs:
  force-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17 & Node 24
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Force Install
        run: npm install --legacy-peer-deps

      - name: THE FORCE BUILD
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          cd android
          chmod +x gradlew
          # -x lint and -x test tell Gradle to ignore all errors except "the app literally won't start"
          ./gradlew assembleDebug -x lint -x test --continue --no-daemon

      - name: Upload APK (Even if it has warnings)
        uses: actions/upload-artifact@v4
        with:
          name: Forge-Forced-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
