name: Forge Ultimate Super-Build
on: [push]

jobs:
  verify-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17 & Node 24
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install & Self-Correct
        # This fixes grammar/style errors before building
        run: |
          npm install --legacy-peer-deps
          npx eslint . --fix || true 

      - name: Build Android APK (API 36)
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          cd android
          chmod +x gradlew
          # 'clean' is critical to wipe away old failed build data
          ./gradlew clean assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Forge-Final-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
