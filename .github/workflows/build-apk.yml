name: Build Forge APK
on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows you to manually trigger a build anytime

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Fixed to 22 for stability

      - name: Setup Java (Required for React Native)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: npm install

      - name: Grant Gradle Permissions
        run: chmod +x android/gradlew

      - name: Build Android APK
        run: npm run build:android

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: Forge-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
