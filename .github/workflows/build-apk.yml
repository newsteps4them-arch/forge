name: Build APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Setup EAS
        run: npm install -g eas-cli
      
      - name: Build APK with EAS
        env:
          EAS_TOKEN: ${{ secrets.EAS_TOKEN }}
        run: eas build --platform android --non-interactive
      
      - name: Upload APK to artifacts
        if: success()
        uses: actions/upload-artifact@v3
        with:
          name: forge-apk
          path: '**/*.apk'
          retention-days: 30

      - name: Create Release
        if: success()
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Forge APK Build ${{ github.run_number }}
          body: |
            Automatic APK build from GitHub Actions
            
            **Build Details:**
            - Commit: ${{ github.sha }}
            - Branch: ${{ github.ref }}
            - Run: ${{ github.run_number }}
            
            Download the APK from the artifacts or releases section.
          draft: false
          prerelease: false
