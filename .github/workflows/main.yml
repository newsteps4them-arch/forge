name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type (debug or release)'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          if [ $? -ne 0 ]; then
            npm install --legacy-peer-deps --force
          fi

      - name: Fix Autolinking for New Architecture
        run: |
          mkdir -p android/app/build/generated/autolinking
          echo "{}" > android/app/build/generated/autolinking/autolinking.json
          # Also create in the location Gradle expects if different
          mkdir -p android/build/generated/autolinking
          echo "{}" > android/build/generated/autolinking/autolinking.json

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build with Gradle
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          if [ "${{ github.event.inputs.build_type }}" == "release" ]; then
            if [ -n "$STORE_PASSWORD" ]; then
              ./gradlew assembleRelease
            else
              echo "Error: Release build requested but secrets are missing. Falling back to debug."
              ./gradlew assembleDebug
            fi
          else
            ./gradlew assembleDebug
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: forge-app-apk-${{ github.event.inputs.build_type }}
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/apk/release/*.apk
