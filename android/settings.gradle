// 1. Tell Gradle where the tools are
pluginManagement {
    includeBuild("../node_modules/@react-native/gradle-plugin")
}

// 2. Load the React Native plugin
plugins {
    id("com.facebook.react.settings")
}

// 3. Set the project name FIRST
rootProject.name = 'forge'

// 4. THE FIX: In 2026, the method is just 'autolink()'
// This handles all your libraries (Reanimated, Worklets, etc.)
extensions.configure(com.facebook.react.ReactSettingsExtension) {
    autolink() 
}

include ':app'
