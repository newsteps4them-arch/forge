pluginManagement {
    // 1. Give Gradle a direct map to the tools
    includeBuild("../node_modules/@react-native/gradle-plugin")
}

plugins {
    // 2. Load the React Native settings plugin
    id("com.facebook.react.settings")
}

// 3. THE FIX: We grab the extension by name and call the exact command
// This bypasses the "Method Not Found" error on the 'forge' settings object.
def reactSettings = extensions.getByName("react")
reactSettings.autolinkLibrariesFromCommand()

rootProject.name = 'forge'
include ':app'
