apply plugin: 'com.android.application'
apply plugin: 'com.facebook.react'

react {
    /* No extra config needed for now */
}


android {
    namespace "com.forge"
    compileSdk 34


    defaultConfig {
        applicationId "com.forge"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }


    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }


    signingConfigs {
        release {
           if (System.getenv('STORE_PASSWORD') != null) {
                storeFile file(System.getenv('KEYSTORE_FILE') ?: "debug.keystore")
                storePassword System.getenv('STORE_PASSWORD')
                keyAlias System.getenv('KEY_ALIAS')
                keyPassword System.getenv('KEY_PASSWORD')
            } else {
                initWith signingConfigs.debug
            }
        }
    }


    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}


// Force all libraries to match your project's versioning
configurations.all {
    resolutionStrategy.eachDependency { DependencyResolveDetails details ->
        if (details.requested.group == 'com.android.support') {
            details.useVersion "28.0.0"
        }
    }
}


subprojects {
    afterEvaluate { project ->
        if (project.hasProperty('android')) {
            project.android {
                if (namespace == null) {
                    namespace project.group ?: "com.forge.${project.name.replace("-", ".")}"
                }
            }
        }
    }
}



dependencies {
    // The version of react-native is set by the react-native-gradle-plugin
    implementation("com.facebook.react:react-android")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}
