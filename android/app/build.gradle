apply plugin: 'com.android.application'
apply plugin: 'com.facebook.react'

android {
    namespace "com.forge"
    compileSdk 36

    defaultConfig {
        applicationId "com.forge"
        minSdk 24
        targetSdk 36
        versionCode 1
        versionName "1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    signingConfigs {
        release {
           if (System.getenv('STORE_PASSWORD') != null) {
                storeFile file(System.getenv('KEYSTORE_FILE') ?: "debug.keystore")
                storePassword System.getenv('STORE_PASSWORD')
                keyAlias System.getenv('KEY_ALIAS')
                keyPassword System.getenv('KEY_PASSWORD')
            } else {
                initWith signingConfigs.debug
            }
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    // This forces the app to ignore library conflicts that cause the Merger Failure
    packagingOptions {
        pickFirst '**/AndroidManifest.xml'
    }
}

// Global fix for Manifest Merger conflicts in dependencies
subprojects {
    afterEvaluate { project ->
        if (project.hasProperty('android')) {
            project.android {
                if (namespace == null) {
                    namespace project.group
                }
            }
        }
    }
}
