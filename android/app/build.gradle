apply plugin: 'com.android.application'
apply plugin: 'com.facebook.react'

/**
 * Forge App Build Configuration
 */
react {
    // Standard React Native configuration
}

def enableProguardInReleaseBuilds = false
def jscFlavor = 'org.webkit:android-jsc:+'

android {
    ndkVersion "27.0.12077973"
    // Bumping to 35 to stop the "version ignored" warnings in your logs
    buildToolsVersion "35.0.0"
    compileSdk 35
    namespace "com.forge"

    defaultConfig {
        applicationId "com.forge"
        minSdk 24
        targetSdk 35
        versionCode 1
        versionName "1.0"
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            if (System.getenv('STORE_PASSWORD') != null) {
                storeFile file(System.getenv('KEYSTORE_FILE') ?: "debug.keystore")
                storePassword System.getenv('STORE_PASSWORD')
                keyAlias System.getenv('KEY_ALIAS')
                keyPassword System.getenv('KEY_PASSWORD')
            } else {
                initWith signingConfigs.debug
            }
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    // The main React Native dependency
    implementation("com.facebook.react:react-android")

    // BRUTE-FORCE FIX: Manually linking the 7 libraries that were failing
    implementation project(':react-native-async-storage_async-storage')
    implementation project(':react-native-gesture-handler')
    implementation project(':react-native-reanimated')
    implementation project(':react-native-safe-area-context')
    implementation project(':react-native-screens')
    implementation project(':react-native-worklets')
    implementation project(':react-native-vector-icons_material-design-icons')

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}
