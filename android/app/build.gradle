apply plugin: 'com.android.application'
apply plugin: 'com.facebook.react'

/**
 * Forge App - 2026 Production Build
 */
react {
    // THE FIX: App uses 'WithApp'
    autolinkLibrariesWithApp()
}

android {
    ndkVersion "27.0.12077973"
    
    // Satisfying the mandatory 2026 requirement for core-ktx 1.17.0
    compileSdk 36
    namespace "com.forge"

    defaultConfig {
        applicationId "com.forge"
        minSdk 24
        targetSdk 36
        versionCode 1
        versionName "1.0"
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            // Using debug keys for now to ensure a successful build without key setup
            signingConfig signingConfigs.debug 
            minifyEnabled false
        }
    }
}

dependencies {
    // The engine handles autolinking automatically via the 'react' block above
    implementation("com.facebook.react:react-android")
}
