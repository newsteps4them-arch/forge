apply plugin: 'com.android.application'
apply plugin: 'com.facebook.react'

/**
 * Forge App - 2026 Master Build
 */
react {
    // This tells the app to accept the libraries found in settings.gradle
    autolinkLibrariesWithApp()
}

android {
    ndkVersion "27.0.12077973"
    compileSdk 36
    namespace "com.forge"

    defaultConfig {
        applicationId "com.forge"
        minSdk 24
        targetSdk 36
        versionCode 1
        versionName "1.0"
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
        }
    }
}

dependencies {
    // The main React Native engine (includes everything else automatically)
    implementation("com.facebook.react:react-android")
}
